# ============================================================
# 光谱-视觉交叉注意力Transformer 模型架构配置文件
# 织物焕新生——纺织品智能分拣
# ============================================================

# ---------- 全局模型参数 ----------
model:
  name: "SpectralVisionCrossAttention"
  d_model: 256                # 公共隐空间维度
  n_heads: 4                  # 多头注意力头数
  d_head: 64                  # 每头维度 (d_model / n_heads)
  attn_dropout: 0.1
  proj_dropout: 0.1
  num_classes: 3              # 布料材质类别数

# ---------- 光谱分支 (→ Q) ----------
spectral_branch:
  # 输入: 近红外光谱 → 灰度图
  input:
    source: "近红外光谱 900-1700nm"
    raw_dim: 1600             # 原始光谱维度
    reshape: [40, 40]         # 重构为灰度图尺寸
    channels: 1               # 灰度图通道
    shape: [B, 1, 40, 40]     # 输入张量形状

  # 特征提取: EfficientNet 微型版
  backbone:
    name: "EfficientNet-Micro"  # 专为40×40设计的微型EfficientNet
    stem:
      - Conv2d(1→32, 3×3, stride=1, padding=1)
      - BatchNorm2d(32)
      - SiLU
    stages:
      - name: "stage1"
        blocks: 1
        mbconv: "MBConv1(3×3)"
        stride: 1
        in_channels: 32
        out_channels: 16
        output_size: [40, 40]
      - name: "stage2"
        blocks: 2
        mbconv: "MBConv6(3×3)"
        stride: 2
        in_channels: 16
        out_channels: 24
        output_size: [20, 20]
      - name: "stage3"
        blocks: 2
        mbconv: "MBConv6(5×5)"
        stride: 2
        in_channels: 24
        out_channels: 40
        output_size: [10, 10]
      - name: "stage4"
        blocks: 3
        mbconv: "MBConv6(3×3)"
        stride: 2
        in_channels: 40
        out_channels: 80
        output_size: [5, 5]

  # 通道映射 → d_model
  channel_mapping:
    operation: "Conv2d(80→256, 1×1)"
    in_channels: 80
    out_channels: 256
    output_feat: [B, 256, 5, 5]

  # Token化
  tokenization:
    operation: "reshape + transpose"
    num_tokens: 25              # 5×5=25个patch/token
    token_dim: 256
    output_shape: [B, 25, 256]

  # 注意力角色
  attention_role: "Q"           # 光谱分支生成Q

# ---------- 视觉分支 (→ K, V) ----------
vision_branch:
  # 输入: RGB图像
  input:
    source: "CMOS工业相机"
    channels: 3                # RGB彩色
    shape: [B, 3, 224, 224]    # 输入张量形状

  # 特征提取: ResNet-18(→layer3) + SPP
  backbone:
    name: "ResNet18_YOLO"      # ResNet-18改进型YOLO骨干
    resnet18_layers:
      - Conv1: "Conv2d(3→64, 7×7, stride=2, padding=3)"
      - BN1: "BatchNorm2d(64)"
      - ReLU: "ReLU"
      - MaxPool: "MaxPool2d(3×3, stride=2)"
      - Layer1: "ResBlock×2 (64→64, stride=1)"
      - Layer2: "ResBlock×2 (64→128, stride=2)"
      - Layer3: "ResBlock×2 (128→256, stride=2)"

    # layer3输出特征图
    layer3_output:
      shape: [B, 256, 14, 14]  # 224/16=14
      channels: 256
      spatial: [14, 14]

    # SPP (Spatial Pyramid Pooling) - YOLO风格
    spp:
      name: "SPP_YOLO"
      pools:
        - kernel: 5
          padding: 2
        - kernel: 9
          padding: 4
        - kernel: 13
          padding: 6
      fusion: "Concat + Conv2d(1024→256, 1×1)"
      output_shape: [B, 256, 14, 14]

  # 通道映射 (已匹配，无需额外操作)
  channel_mapping:
    operation: "Identity"      # 已是256通道，无需映射
    in_channels: 256
    out_channels: 256

  # Token化
  tokenization:
    operation: "reshape + transpose"
    num_tokens: 196             # 14×14=196个patch/token
    token_dim: 256
    output_shape: [B, 196, 256]

  # 注意力角色
  attention_role: "K, V"       # 视觉分支生成K和V

# ---------- 交叉注意力 ----------
cross_attention:
  input:
    Q: [B, 25, 256]            # 来自光谱分支
    K: [B, 196, 256]           # 来自视觉分支
    V: [B, 196, 256]           # 来自视觉分支

  # 线性投影 (Q/K/V各一个)
  linear_projection:
    Q_proj: "Linear(256→256)"
    K_proj: "Linear(256→256)"
    V_proj: "Linear(256→256)"
    params_per_proj: 65792     # 256×256+256

  # 多头拆分
  multi_head_split:
    n_heads: 4
    d_head: 64
    Q_split: "(B,4,25,64)"     # 拆分后Q形状
    K_split: "(B,4,196,64)"    # 拆分后K形状
    V_split: "(B,4,196,64)"    # 拆分后V形状

  # 注意力计算 (每头独立)
  attention_computation:
    score: "Q × K^T / √64"    # 注意力分数
    score_shape: [B, 4, 25, 196]  # 25个光谱token × 196个图像token
    attn_weights: "softmax(score, dim=-1)"  # 归一化权重
    weighted_sum: "attn_weights × V"        # 加权聚合
    head_output: [B, 4, 25, 64]             # 每头输出

  # 多头合并
  merge:
    operation: "transpose + reshape"
    merged_shape: [B, 25, 256]  # 4个头拼接回256维

  # 输出投影 + 残差 + 归一化
  output:
    projection: "Linear(256→256)"   # 输出投影
    residual: "output_proj + Q_proj" # 残差连接
    norm: "LayerNorm(256)"           # 层归一化
    dropout: 0.1
    final_shape: [B, 25, 256]

# ---------- 池化层 ----------
pooling:
  type: "全局平均池化 (Global Average Pooling)"
  operation: "mean(dim=1)"
  input_shape: [B, 25, 256]
  output_shape: [B, 256]

# ---------- 分类头 ----------
classification_head:
  # FC1
  fc1:
    type: "Linear"
    in_features: 256
    out_features: 128
    activation: "GELU"
    dropout: 0.1
    params: 32896              # 256×128+128
    input_shape: [B, 256]
    output_shape: [B, 128]

  # FC2
  fc2:
    type: "Linear"
    in_features: 128
    out_features: 3            # 3类布料材质
    activation: "none"         # 无激活，输出logits
    params: 387                # 128×3+3
    input_shape: [B, 128]
    output_shape: [B, 3]

# ---------- 参数量汇总 ----------
parameters_summary:
  spectral_effnet: 398000      # EfficientNet微型版 (估算)
  spectral_conv1x1: 20736      # 80→256通道映射
  vision_resnet18: 11178000    # ResNet-18(→layer3) (估算)
  vision_spp: 525000           # SPP模块 (估算)
  Q_proj: 65792
  K_proj: 65792
  V_proj: 65792
  attention_output_proj: 65792
  attention_norm: 512
  fc1: 32896
  fc2: 387
  total: "≈12.2M"             # 总参数量

# ---------- 训练配置 ----------
training:
  batch_size: 32
  epochs: 100
  optimizer: "AdamW"
  learning_rate: 1.0e-3
  weight_decay: 1.0e-4
  scheduler: "CosineAnnealingLR"
  loss: "CrossEntropyLoss"