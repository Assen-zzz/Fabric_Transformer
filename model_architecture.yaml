# ============================================================
# 光谱-视觉交叉注意力Transformer 模型架构配置文件
# 织物焕新生——纺织品智能分拣
# 本文件定义了完整的模型结构，包括输入尺寸、特征提取网络、
# 注意力机制参数和分类头配置。
# ============================================================

# ---------- 全局模型参数 ----------
# 这部分定义了整个模型共用的超参数
model:
  # 模型名称，用于日志记录和模型保存
  name: "SpectralVisionCrossAttention"
  # 公共隐空间维度，即所有token的特征向量长度
  # 光谱和图像的特征最终都映射到这个维度才能在注意力中计算
  d_model: 256
  # 多头注意力头数，将256维拆成4个64维子空间并行计算
  n_heads: 4
  # 每头维度 = d_model / n_heads = 256/4 = 64
  # 每个头在64维子空间中独立做注意力
  d_head: 64
  # 注意力权重上的dropout比率，随机丢弃一部分注意力权重防止过拟合
  attn_dropout: 0.1
  # 输出投影层后的dropout比率
  proj_dropout: 0.1
  # 布料材质类别数，即最终分类输出维度（如棉/涤纶/混纺3类）
  num_classes: 3

# ---------- 光谱分支 (→ Q) ----------
# 光谱分支负责处理近红外光谱数据，生成注意力机制中的Q（查询）张量
spectral_branch:
  # === 输入: 近红外光谱 → 灰度图 ===
  # 原始光谱是1600维的一维向量，需要重构为二维灰度图才能用CNN提取特征
  input:
    # 数据来源：近红外光谱仪，波长范围900-1700nm
    source: "近红外光谱 900-1700nm"
    # 原始光谱维度：每条光谱曲线采样1600个点
    raw_dim: 1600
    # 将1600维光谱重构为40×40的灰度图（40×40=1600）
    reshape: [40, 40]
    # 灰度图通道数为1（黑白，只有亮度信息）
    channels: 1
    # 输入张量形状：[Batch, 通道数, 高, 宽]
    shape: [B, 1, 40, 40]

  # === 特征提取: EfficientNet 微型版 ===
  # 使用专为40×40小图设计的微型EfficientNet，包含4个MBConv阶段
  backbone:
    # 网络名称：专为40×40小尺寸输入设计的微型EfficientNet
    name: "EfficientNet-Micro"
    # 起始层：先用一个普通卷积提取底层特征
    stem:
      # 输入1通道→输出32通道, 3×3卷积核, stride=1保持尺寸不缩小
      # padding=1保证40×40大小不变（(40+2-3)/1+1=40）
      - Conv2d(1→32, 3×3, stride=1, padding=1)
      # 批归一化，加速训练收敛，稳定特征分布
      - BatchNorm2d(32)
      # SiLU激活函数 SiLU(x)=x×sigmoid(x)，比ReLU更平滑、梯度更好
      - SiLU

    # 4个MBConv阶段，逐步下采样并增加通道数
    stages:
      # ---- 第一阶段：提取细粒度光谱局部特征 ----
      - name: "stage1"
        # 1个MBConv块（浅层不需要太多堆叠）
        blocks: 1
        # MBConv1：扩展比=1的移动翻转瓶颈卷积
        # 不扩展通道，直接做3×3深度可分离卷积，参数少
        mbconv: "MBConv1(3×3)"
        # 步长=1，保持空间尺寸40×40不变
        stride: 1
        # 输入通道32（来自stem的输出）
        in_channels: 32
        # 输出通道16
        out_channels: 16
        # 输出特征图尺寸仍为40×40
        output_size: [40, 40]

      # ---- 第二阶段：捕获稍大范围的光谱纹理模式 ----
      - name: "stage2"
        # 2个MBConv块（加深特征提取）
        blocks: 2
        # MBConv6：扩展比=6，先升维6倍再深度卷积再降维
        # 升维可以增加表达能力，降维减少计算量
        mbconv: "MBConv6(3×3)"
        # 步长=2，空间尺寸减半：40→20
        stride: 2
        # 输入通道16
        in_channels: 16
        # 输出通道24
        out_channels: 24
        # 输出特征图尺寸20×20
        output_size: [20, 20]

      # ---- 第三阶段：捕获更大范围的光谱区域特征 ----
      - name: "stage3"
        # 2个MBConv块
        blocks: 2
        # 使用5×5深度卷积，比3×3感受野更大，能捕获更大范围的光谱特征
        mbconv: "MBConv6(5×5)"
        # 步长=2，空间尺寸减半：20→10
        stride: 2
        # 输入通道24
        in_channels: 24
        # 输出通道40
        out_channels: 40
        # 输出特征图尺寸10×10
        output_size: [10, 10]

      # ---- 第四阶段：提取全局光谱抽象特征 ----
      - name: "stage4"
        # 3个MBConv块，最深层堆叠更多块提取抽象特征
        blocks: 3
        # 恢复3×3深度卷积
        mbconv: "MBConv6(3×3)"
        # 步长=2，空间尺寸减半：10→5
        stride: 2
        # 输入通道40
        in_channels: 40
        # 输出通道80
        out_channels: 80
        # 输出特征图尺寸5×5，得到5×5=25个空间位置
        output_size: [5, 5]

  # === 通道映射 → d_model ===
  # 将EfficientNet输出的80通道映射到d_model=256
  # 目的：让光谱特征的维度与d_model一致，才能与视觉特征在注意力中计算
  channel_mapping:
    # 1×1卷积：只改变通道数不改变空间尺寸，相当于每个位置的全连接层
    operation: "Conv2d(80→256, 1×1)"
    # 输入通道80（EfficientNet最后一层stage4的输出通道）
    in_channels: 80
    # 输出通道256（等于d_model，与视觉分支维度匹配）
    out_channels: 256
    # 输出特征图：[Batch, 256, 5, 5]，空间尺寸5×5不变
    output_feat: [B, 256, 5, 5]

  # === Token化 ===
  # 将二维特征图转化为一维token序列，才能送入Transformer注意力机制
  tokenization:
    # reshape: (B,256,5,5)→(B,256,25) 展平空间维度
    # transpose: (B,256,25)→(B,25,256) 交换维度，使序列维度在前
    operation: "reshape + transpose"
    # 25个token = 5×5特征图的每个位置对应一个token
    num_tokens: 25
    # 每个token的特征维度为256（d_model）
    token_dim: 256
    # 输出形状：[Batch, 25个token, 256维特征] → 送入注意力的Q
    output_shape: [B, 25, 256]

  # === 注意力角色 ===
  # 光谱分支在交叉注意力中扮演的角色
  attention_role: "Q"
  # Q（Query，查询）：光谱的25个token作为查询，主动去图像中寻找相关特征

# ---------- 视觉分支 (→ K, V) ----------
# 视觉分支负责处理RGB图像数据，生成注意力机制中的K（键）和V（值）张量
vision_branch:
  # === 输入: RGB图像 ===
  input:
    # 数据来源：CMOS工业相机拍摄的纺织品RGB图像
    source: "CMOS工业相机"
    # RGB彩色图像，3通道（红/绿/蓝）
    channels: 3
    # 输入张量形状：[Batch, 3通道, 224高, 224宽]
    shape: [B, 3, 224, 224]

  # === 特征提取: ResNet-18(→layer3) + SPP ===
  # 使用ResNet-18的前3个layer（到layer3为止）提取视觉特征
  # 在layer3后加入YOLO风格的SPP模块捕获多尺度上下文
  backbone:
    # 网络名称：ResNet-18改进型YOLO骨干
    name: "ResNet18_YOLO"
    # ResNet-18的各层定义（只取到layer3，丢弃layer4和之后的全局池化+FC）
    resnet18_layers:
      # 第1层：7×7大卷积核快速下采样，步长2将224→112
      - Conv1: "Conv2d(3→64, 7×7, stride=2, padding=3)"
      # 批归一化，稳定特征分布
      - BN1: "BatchNorm2d(64)"
      # ReLU激活函数
      - ReLU: "ReLU"
      # 3×3最大池化，步长2，将112→56
      - MaxPool: "MaxPool2d(3×3, stride=2)"
      # Layer1：2个残差块，64通道→64通道，stride=1保持56×56
      - Layer1: "ResBlock×2 (64→64, stride=1)"
      # Layer2：2个残差块，64通道→128通道，stride=2将56→28
      - Layer2: "ResBlock×2 (64→128, stride=2)"
      # Layer3：2个残差块，128通道→256通道，stride=2将28→14
      - Layer3: "ResBlock×2 (128→256, stride=2)"

    # === layer3输出特征图 ===
    # 经过上述各层后，224×224图像被下采样16倍得到14×14特征图
    layer3_output:
      # 输出形状：[Batch, 256, 14, 14]
      shape: [B, 256, 14, 14]
      # 通道数256，正好等于d_model，无需额外映射
      channels: 256
      # 空间尺寸14×14，展开后得到196个token
      spatial: [14, 14]

    # === SPP (Spatial Pyramid Pooling) - YOLO风格 ===
    # 空间金字塔池化：用不同尺寸的池化核捕获多尺度上下文信息
    spp:
      # 模块名称：YOLO风格SPP
      name: "SPP_YOLO"
      # 三个并行池化分支，每个使用不同大小的池化核
      pools:
        # 核大小5×5，padding=2，输出尺寸仍为14×14
        # 捕获局部纹理细节（约35%感受野）
        - kernel: 5
          padding: 2
        # 核大小9×9，padding=4，输出尺寸仍为14×14
        # 捕获中等范围编织纹理
        - kernel: 9
          padding: 4
        # 核大小13×13，padding=6，输出尺寸仍为14×14
        # 捕获全局布料褶皱/整体图案
        - kernel: 13
          padding: 6
      # 融合方式：拼接四个分支（原始+3个池化）→ 1×1卷积降维
      # 拼接后通道：256×4=1024，再Conv2d(1024→256)降回256
      fusion: "Concat + Conv2d(1024→256, 1×1)"
      # SPP输出形状，与输入一致：[B, 256, 14, 14]
      output_shape: [B, 256, 14, 14]

  # === 通道映射 (已匹配，无需额外操作) ===
  # ResNet-18的layer3输出已经是256通道，等于d_model，无需额外映射
  channel_mapping:
    # Identity（恒等映射）：什么都不做，直接通过
    operation: "Identity"
    # 输入通道256（layer3的输出通道）
    in_channels: 256
    # 输出通道256（保持不变）
    out_channels: 256

  # === Token化 ===
  # 将14×14特征图转化为196个token序列
  tokenization:
    # reshape: (B,256,14,14)→(B,256,196) 展平空间维度
    # transpose: (B,256,196)→(B,196,256) 交换维度
    operation: "reshape + transpose"
    # 196个token = 14×14特征图的每个位置对应一个token
    # 每个token代表图像上16×16像素区域（因为224/14=16）
    num_tokens: 196
    # 每个token的特征维度为256（d_model）
    token_dim: 256
    # 输出形状：[Batch, 196个token, 256维特征] → 送入注意力的K和V
    output_shape: [B, 196, 256]

  # === 注意力角色 ===
  # 视觉分支在交叉注意力中扮演的角色
  attention_role: "K, V"
  # K（Key，键）：图像token作为被查询的"键"，与Q计算相似度
  # V（Value，值）：图像token作为"值"，按注意力权重加权求和

# ---------- 交叉注意力 ----------
# 核心模块：光谱Q查询图像K，得到注意力权重后加权聚合V
cross_attention:
  # === 输入张量 ===
  input:
    # Q来自光谱分支，25个光谱token，每个256维
    Q: [B, 25, 256]
    # K来自视觉分支，196个图像token，每个256维
    K: [B, 196, 256]
    # V来自视觉分支，196个图像token，每个256维
    V: [B, 196, 256]

  # === 线性投影 (Q/K/V各一个) ===
  # Q/K/V各自通过一个独立的线性层进行特征变换
  # 目的是让每个张量在进入注意力前进行特征重映射
  linear_projection:
    # Q的线性投影：256维→256维，不改变形状只变换特征空间
    Q_proj: "Linear(256→256)"
    # K的线性投影：256维→256维
    K_proj: "Linear(256→256)"
    # V的线性投影：256维→256维
    V_proj: "Linear(256→256)"
    # 每个线性层的参数量：256×256(权重) + 256(偏置) = 65,792
    params_per_proj: 65792

  # === 多头拆分 ===
  # 将256维均分为4份64维，每个头独立计算注意力
  multi_head_split:
    # 头数4，与全局配置一致
    n_heads: 4
    # 每头维度64 = 256/4
    d_head: 64
    # Q拆分后形状：(Batch, 4头, 25个光谱token, 每头64维)
    Q_split: "(B,4,25,64)"
    # K拆分后形状：(Batch, 4头, 196个图像token, 每头64维)
    K_split: "(B,4,196,64)"
    # V拆分后形状：(Batch, 4头, 196个图像token, 每头64维)
    V_split: "(B,4,196,64)"

  # === 注意力计算 (每头独立) ===
  attention_computation:
    # 注意力分数 = Q × K^T / √d_head
    # Q(4,25,64) × K^T(4,64,196) → score(4,25,196)
    # 除以√64=8是为了防止点积结果太大导致softmax梯度饱和
    score: "Q × K^T / √64"
    # 注意力分数矩阵形状：(Batch, 4头, 25个Q, 196个K)
    # 每个光谱token与所有196个图像token的相似度
    score_shape: [B, 4, 25, 196]
    # 对score的最后一维(dim=-1，即196个图像token)做softmax
    # 使得每行（每个光谱token对196个图像token的权重）求和=1
    attn_weights: "softmax(score, dim=-1)"
    # 加权聚合：注意力权重 × V
    # attn(4,25,196) × V(4,196,64) → output(4,25,64)
    # 每个光谱token的输出 = 所有196个图像token的加权平均
    weighted_sum: "attn_weights × V"
    # 每头输出形状：(Batch, 4头, 25个token, 每头64维)
    head_output: [B, 4, 25, 64]

  # === 多头合并 ===
  # 将4个头的输出拼接回256维
  merge:
    # transpose+reshape：(B,4,25,64)→(B,25,4,64)→(B,25,256)
    operation: "transpose + reshape"
    # 合并后形状：(Batch, 25个token, 256维)
    # 每个token的256维 = 4个头各64维的拼接
    merged_shape: [B, 25, 256]

  # === 输出投影 + 残差 + 归一化 ===
  output:
    # 输出投影：对多头拼接结果做一次线性变换，让4个头的信息融合
    projection: "Linear(256→256)"
    # 残差连接：输出投影的结果 + 原始Q_proj（输入Q的线性投影）
    # 作用：让梯度可以直接流回前面的层，缓解梯度消失
    residual: "output_proj + Q_proj"
    # 层归一化：对每个token的256维特征做归一化
    # 稳定特征分布，加速训练
    norm: "LayerNorm(256)"
    # dropout：随机丢弃10%的神经元防止过拟合
    dropout: 0.1
    # 最终输出形状：(Batch, 25个token, 256维)
    # 注意：保留了Q的序列长度25，光谱token数不变
    final_shape: [B, 25, 256]

# ---------- 池化层 ----------
# 将25个token的序列聚合成一个全局特征向量
pooling:
  # 全局平均池化：对序列维度（dim=1）取均值
  type: "全局平均池化 (Global Average Pooling)"
  # 操作：torch.mean(dim=1)，对25个token取平均
  operation: "mean(dim=1)"
  # 输入形状：(Batch, 25个token, 256维)
  input_shape: [B, 25, 256]
  # 输出形状：(Batch, 256维)，25个token压缩为1个全局向量
  # 这个256维向量同时包含了光谱信息和融合的图像信息
  output_shape: [B, 256]

# ---------- 分类头 ----------
# 两层全连接网络，将256维全局特征映射到3类分类结果
classification_head:
  # === FC1: 第一层全连接 ===
  fc1:
    # 全连接层类型
    type: "Linear"
    # 输入特征数256（池化后的全局特征维度）
    in_features: 256
    # 输出特征数128（隐藏层维度）
    out_features: 128
    # GELU激活函数：比ReLU更平滑，x×Φ(x)形式
    # 在小数据上表现通常优于ReLU
    activation: "GELU"
    # dropout比率0.1，随机丢弃10%的神经元防止过拟合
    dropout: 0.1
    # 参数量：256×128(权重) + 128(偏置) = 32,896
    params: 32896
    # 输入形状：(Batch, 256)
    input_shape: [B, 256]
    # 输出形状：(Batch, 128)
    output_shape: [B, 128]

  # === FC2: 第二层全连接（输出层） ===
  fc2:
    # 全连接层类型
    type: "Linear"
    # 输入特征数128（FC1的输出）
    in_features: 128
    # 输出特征数3（对应3类布料材质）
    out_features: 3
    # 无激活函数，直接输出logits（原始分数）
    # 在训练时CrossEntropyLoss内部会做softmax
    activation: "none"
    # 参数量：128×3(权重) + 3(偏置) = 387
    params: 387
    # 输入形状：(Batch, 128)
    input_shape: [B, 128]
    # 输出形状：(Batch, 3)，每个样本得到3个类别的分数
    # 推理时取argmax得到预测类别
    output_shape: [B, 3]

# ---------- 参数量汇总 ----------
# 各模块的参数量估算，用于了解模型大小
parameters_summary:
  # 光谱EfficientNet微型版参数量（包含stem和4个stage的MBConv块）
  spectral_effnet: 398000
  # 光谱1×1通道映射层参数量（80→256）
  spectral_conv1x1: 20736
  # 视觉ResNet-18(到layer3为止)参数量（Conv1+Layer1+Layer2+Layer3）
  vision_resnet18: 11178000
  # 视觉SPP模块参数量（3个池化+拼接+1×1卷积降维）
  vision_spp: 525000
  # Q线性投影参数量
  Q_proj: 65792
  # K线性投影参数量
  K_proj: 65792
  # V线性投影参数量
  V_proj: 65792
  # 注意力输出投影参数量
  attention_output_proj: 65792
  # 注意力LayerNorm参数量（γ和β各256个）
  attention_norm: 512
  # FC1参数量
  fc1: 32896
  # FC2参数量
  fc2: 387
  # 总参数量：约1220万
  total: "≈12.2M"

# ---------- 训练配置 ----------
# 训练过程的超参数
training:
  # 批大小：每次训练迭代使用32个样本
  batch_size: 32
  # 训练轮数：完整遍历训练集100次
  epochs: 100
  # 优化器：AdamW（Adam的改进版，带权重衰减解耦）
  optimizer: "AdamW"
  # 学习率：参数更新步长0.001
  learning_rate: 1.0e-3
  # 权重衰减：L2正则化系数，防止过拟合
  weight_decay: 1.0e-4
  # 学习率调度器：余弦退火，学习率从初始值按余弦曲线下降到0
  scheduler: "CosineAnnealingLR"
  # 损失函数：交叉熵损失，适用于多分类问题
  loss: "CrossEntropyLoss"